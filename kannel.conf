# =============================================================================
# TumaSend Gateway — Kannel Configuration
# =============================================================================
#
# ARCHITECTURE
#   bearerbox  — manages SMSC (operator) connections
#   smsbox     — exposes HTTP API used by the Express backend
#
# PORTS
#   smsbox HTTP send API    →  port 80   (localhost only)
#   bearerbox admin         →  port 13000 (localhost only)
#   bearerbox ↔ smsbox      →  port 13001 (internal, localhost only)
#
# EXPRESS BACKEND
#   Runs on port 3001
#   DLR webhooks  →  GET http://127.0.0.1:3001/api/v1/webhooks/kannel/dlr
#   MO  webhooks  →  GET http://127.0.0.1:3001/api/v1/webhooks/kannel/mo
#
# REQUIRED ENV (.env on Express server)
#   KANNEL_HOST=127.0.0.1
#   KANNEL_PORT=80
#   KANNEL_USERNAME=tumasend
#   KANNEL_PASSWORD=<value of sendsms-user password below>
#   PORT=3001
#
# NOTE ON PORT 80
#   Kannel must run as root (or with CAP_NET_BIND_SERVICE) to bind port 80.
#   If Nginx sits in front of this server on port 80/443 for the Express API,
#   move sendsms-port to 8080 and update KANNEL_PORT in .env accordingly.
#
# SMSC STATUS
#   Both TNM and Airtel blocks are commented out — fill in credentials and
#   uncomment when operator accounts are provisioned. Kannel will start
#   without them; messages will queue until at least one SMSC connects.
#
# SETUP ON SERVER
#   mkdir -p /var/log/kannel /var/spool/kannel/store /var/spool/kannel/dlr
#   chown kannel:kannel /var/log/kannel /var/spool/kannel
#   cp kannel.conf /etc/kannel/kannel.conf
# =============================================================================


# -----------------------------------------------------------------------------
# 1. BEARERBOX CORE
# -----------------------------------------------------------------------------
group = core

# Admin HTTP interface — monitor bearerbox status
admin-port = 13000
admin-password = CHANGE_ME_ADMIN_PASSWORD
status-password = CHANGE_ME_STATUS_PASSWORD

# Lock admin and smsbox connections to localhost
admin-deny-ip = *.*.*.*
admin-allow-ip = 127.0.0.1
box-deny-ip    = *.*.*.*
box-allow-ip   = 127.0.0.1

# Port bearerbox listens on for incoming smsbox connections (internal)
smsbox-port = 13001

# Logging
log-file   = /var/log/kannel/bearerbox.log
log-level  = 1                # 0=debug 1=info 2=warning 3=error
access-log = /var/log/kannel/bearerbox-access.log

# Persist the message queue to disk so in-flight messages survive restarts
store-type     = file
store-location = /var/spool/kannel/store

# DLR receipt persistence — survives Kannel restarts
# Uses the same store-location directory
dlr-storage = file

# Retry undelivered messages up to 3 times, waiting 60 s between attempts
sms-resend-retry = 3
sms-resend-sleep = 60


# -----------------------------------------------------------------------------
# 2. SMSC — TNM
#    Uncomment the entire block when TNM credentials are available.
#    Malawi TNM numbers: +26588xxxxxxx, +26589xxxxxxx
# -----------------------------------------------------------------------------
#group = smsc
#smsc-id              = tnm
#smsc                 = smpp
#host                 = 41.78.250.88
#port                 = 5016
#smsc-username        = YOUR_TNM_USERNAME
#smsc-password        = YOUR_TNM_PASSWORD
#
## transceiver-mode enables both MO (inbound) and MT (outbound) on one connection
#transceiver-mode     = yes
#
## source-addr-ton 5 = alphanumeric sender ID (e.g. LETTSCOMM)
## source-addr-ton 1 = international numeric (e.g. +265...)
## Confirm the correct value with TNM — most Malawi operators accept 5
#source-addr-ton      = 5
#source-addr-npi      = 0
#dest-addr-ton        = 1
#dest-addr-npi        = 1
#
#system-type          = default
#interface-version    = 34     # SMPP v3.4
#max-pending-submits  = 100    # max simultaneous in-flight messages
#reconnect-delay      = 10     # seconds between reconnect attempts
#wait-ack             = 120    # seconds to wait for SMPP submit_sm_resp
#wait-ack-expire      = error  # treat expired ack as a send failure
#
## Route messages destined for TNM numbers through this SMSC
#allowed-prefix       = +26588;+26589
#
#log-file             = /var/log/kannel/smsc-tnm.log
#log-level            = 1


# -----------------------------------------------------------------------------
# 3. SMSC — Airtel
#    Uncomment the entire block when Airtel credentials are available.
#    Malawi Airtel numbers: +26599xxxxxxx, +26577xxxxxxx
# -----------------------------------------------------------------------------
#group = smsc
#smsc-id              = airtel
#smsc                 = smpp
#host                 = messaging.airtel.mw
#port                 = 9001
#smsc-username        = YOUR_AIRTEL_USERNAME
#smsc-password        = YOUR_AIRTEL_PASSWORD
#
#transceiver-mode     = yes
#
#source-addr-ton      = 5
#source-addr-npi      = 0
#dest-addr-ton        = 1
#dest-addr-npi        = 1
#
#system-type          = default
#interface-version    = 34
#max-pending-submits  = 100
#reconnect-delay      = 10
#wait-ack             = 120
#wait-ack-expire      = error
#
## Route messages destined for Airtel numbers through this SMSC
#allowed-prefix       = +26599;+26577
#
#log-file             = /var/log/kannel/smsc-airtel.log
#log-level            = 1


# -----------------------------------------------------------------------------
# 4. SMSBOX
#    Exposes the HTTP send API that Express calls to submit messages.
# -----------------------------------------------------------------------------
group = smsbox

# Connect to bearerbox locally
bearerbox-host = 127.0.0.1
# (smsbox-port 13001 is read from the core group above)

# HTTP send API port — Express calls GET http://127.0.0.1:80/cgi-bin/sendsms
sendsms-port = 80

# Restrict HTTP API to localhost — Express is the only authorised caller
sendsms-deny-ip  = *.*.*.*
sendsms-allow-ip = 127.0.0.1

# Logging
log-file   = /var/log/kannel/smsbox.log
log-level  = 1
access-log = /var/log/kannel/smsbox-access.log


# -----------------------------------------------------------------------------
# 5. SENDSMS USER
#    Express authenticates every send request with these credentials.
#    Set KANNEL_USERNAME and KANNEL_PASSWORD in your .env to match.
# -----------------------------------------------------------------------------
group = sendsms-user
username      = tumasend
password      = CHANGE_ME_SENDSMS_PASSWORD

# Automatically split messages longer than 160 chars into multipart SMS
concatenation = true
max-messages  = 255           # maximum parts per long message

# Let Kannel pick the SMSC based on the destination prefix routing above.
# Once both SMSCs are active you can set default-smsc = tnm or airtel
# to specify a fallback if prefix routing does not match.
default-smsc  = *


# -----------------------------------------------------------------------------
# 6. INBOUND SMS — MO (Mobile Originated / Two-Way)
#    Routes every inbound message received on a connected SMSC to Express.
#
#    Express endpoint to implement:
#      GET /api/v1/webhooks/kannel/mo
#      Query params:
#        from  = sender phone number   (%p)
#        to    = recipient / shortcode (%P)
#        text  = URL-encoded message   (%b)
#        smsc  = SMSC ID that received it  (%i)
#        time  = timestamp             (%t)
#
#    Delivery reports (DLR) are handled separately: Express sets dlr-url
#    and dlr-mask=31 on each outbound send request, and Kannel fires the
#    callback when the operator returns a receipt. No extra config needed
#    here — DLR is already wired in smsService.js.
# -----------------------------------------------------------------------------
group = sms-service
name      = mo-handler
get-url   = "http://127.0.0.1:3001/api/v1/webhooks/kannel/mo?from=%p&to=%P&text=%b&smsc=%i&time=%t"
catch-all = yes               # handle all inbound messages not matched elsewhere
max-messages = 0              # do not auto-reply
