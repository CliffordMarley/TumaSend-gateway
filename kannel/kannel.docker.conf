# =============================================================================
# TumaSend Gateway — Kannel Docker Configuration
# Variables are injected by entrypoint.sh via envsubst at container start.
# =============================================================================


# -----------------------------------------------------------------------------
# 1. BEARERBOX CORE
# -----------------------------------------------------------------------------
group = core

admin-port = 13000
admin-password = ${KANNEL_ADMIN_PASSWORD}
status-password = ${KANNEL_STATUS_PASSWORD}

# bearerbox and smsbox run in the same container — lock to localhost
admin-deny-ip = *.*.*.*
admin-allow-ip = 127.0.0.1
box-deny-ip    = *.*.*.*
box-allow-ip   = 127.0.0.1

# Internal bearerbox <-> smsbox port
smsbox-port = 13001

log-file   = /var/log/kannel/bearerbox.log
log-level  = 1
access-log = /var/log/kannel/bearerbox-access.log

store-type     = file
store-location = /var/spool/kannel/store
dlr-storage    = file

sms-resend-retry = 3
sms-resend-sleep = 60


