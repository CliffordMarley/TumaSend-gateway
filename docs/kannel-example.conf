# Core Kannel Configuration
group = core
admin-port = 13000
smsbox-port = 13001
admin-password = "supersecretpassword"
log-file = "/var/log/kannel/kannel.log"
log-level = 0
access-log = "/var/log/kannel/access.log"

# SMS Box Configuration
group = smsbox
bearerbox-host = "127.0.0.1"
sendsms-port = 13013
global-sender = "TumaSend"
log-file = "/var/log/kannel/smsbox.log"
log-level = 0

# TumaSend API User (Your Node.js app uses this to connect to Kannel)
group = sendsms-user
username = "tuma_app"
password = "tuma_password"
# Allow sending from localhost (or your server's IP)
# user-allow-ip = "127.0.0.1"
max-messages = 10

# ---------------------------------------------------------
# TNM SMSC Setup (Assuming SMPP)
# ---------------------------------------------------------
group = smsc
smsc = smpp
smsc-id = TNM
host = "tnm.smsc.ip.address"
port = 2775
smsc-username = "your_tnm_username"
smsc-password = "your_tnm_password"
system-type = "VMA"
# Routing magic happens here:
# 2658 covers TNM numbers (e.g., 26588...)
allowed-prefix = "2658"
denied-prefix = "2659"
source-addr-ton = 5
source-addr-npi = 0
dest-addr-ton = 1
dest-addr-npi = 1

# ---------------------------------------------------------
# AIRTEL SMSC Setup (Assuming SMPP)
# ---------------------------------------------------------
group = smsc
smsc = smpp
smsc-id = AIRTEL
host = "airtel.smsc.ip.address"
port = 2775
smsc-username = "your_airtel_username"
smsc-password = "your_airtel_password"
system-type = "VMA"
# Routing magic happens here:
# 2659 covers Airtel numbers (e.g., 26599...)
allowed-prefix = "2659"
denied-prefix = "2658"
source-addr-ton = 5
source-addr-npi = 0
dest-addr-ton = 1
dest-addr-npi = 1
