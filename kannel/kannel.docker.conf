# -----------------------------------------------------------------------------
# 4. SMSBOX
# -----------------------------------------------------------------------------
group = smsbox

bearerbox-host = 127.0.0.1

# Port 13013 avoids needing root (unlike port 80 on bare metal)
sendsms-port = 13013

# Allow requests from the gateway container (Docker internal network).
# This port is NOT published to the host, so allowing the internal subnet is safe.
sendsms-deny-ip  = *.*.*.*
sendsms-allow-ip = ${KANNEL_TRUSTED_SUBNET}

log-file   = /var/log/kannel/smsbox.log
log-level  = 1
access-log = /var/log/kannel/smsbox-access.log


# -----------------------------------------------------------------------------
# 5. SENDSMS USER
# -----------------------------------------------------------------------------
group = sendsms-user

username      = ${KANNEL_USERNAME}
password      = ${KANNEL_PASSWORD}
concatenation = true
max-messages  = 255
default-smsc  = *


# -----------------------------------------------------------------------------
# 6. INBOUND SMS — MO (Mobile Originated)
#    Routes inbound messages to the Express gateway container.
# -----------------------------------------------------------------------------
group = sms-service
name         = mo-handler
get-url      = "http://${GATEWAY_HOST}:${GATEWAY_PORT}/api/v1/webhooks/kannel/mo?from=%p&to=%P&text=%b&smsc=%i&time=%t"
catch-all    = yes
max-messages = 0
